# PlayDesk CI — lint, typecheck, test for the Django + Next.js monorepo.
#
# Progressive activation: the `detect` job checks which parts of the monorepo
# exist. The `backend` job runs once `backend/manage.py` lands; the `frontend`
# job runs once `frontend/package.json` lands. Until then they skip and CI is
# green — so this pipeline can be committed in Wave 0 before any app code.
#
# Make `ci-ok` the single required status check in branch protection; it stays
# stable as the scaffold lands (skipped jobs do not count as failures).

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f backend/manage.py ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f frontend/package.json ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Postgres with pgvector — matches the production data layer (vector
    # search + the EXCLUDE/btree_gist booking-overlap constraint).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: playdesk
          POSTGRES_PASSWORD: playdesk
          POSTGRES_DB: playdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U playdesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://playdesk:playdesk@localhost:5432/playdesk_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run
      - name: Apply migrations
        run: python manage.py migrate
      - name: Tests (pytest)
        run: pytest --cov --cov-report=term-missing

  frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  # Single aggregate gate — require THIS check in branch protection.
  ci-ok:
    needs: [detect, backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any job failed
        run: |
          if ${{ contains(needs.*.result, 'failure') }}; then
            echo "A CI job failed."
            exit 1
          fi
          echo "CI passed."
