# PlayDesk integrity suite — boots the full docker compose stack and runs the
# cross-component journeys against it: HTTP/SSE integration tests + Playwright
# browser E2E. This is the layer that catches contract drift, wiring, and
# timezone bugs that the mock-based unit suites (ci.yml) cannot.
#
# Heavier than ci.yml, so it is its own workflow. Tests that need an LLM key
# skip automatically when the secret is absent (e.g. fork PRs), so the suite
# stays green without secrets.

name: Integrity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # nightly

concurrency:
  group: integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether to spend LLM tokens on this run. Pushes to main, scheduled
  # nightly runs, and manual dispatches always exercise the full stack.
  # Pull requests only do so when they touch agent / RAG / chat / SSE code —
  # docs-only and style-only PRs run the contract suite without keys.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_llm: ${{ steps.decide.outputs.run_llm }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            llm_paths:
              - 'backend/agent/**'
              - 'backend/agent_tools/**'
              - 'backend/rag/**'
              - 'backend/core/models.py'
              - 'backend/api/**'
              - 'frontend/src/app/chat/**'
              - 'frontend/src/lib/useChatStream*'
              - 'integration/**'
              - 'frontend/e2e/**'
              - 'docs/contracts/sse-protocol.md'
              - 'docs/contracts/openapi.yaml'
              - '.github/workflows/integrity.yml'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.filter.outputs.llm_paths }}" = "true" ]; then
            echo "run_llm=true" >> "$GITHUB_OUTPUT"
            echo "LLM-gated tests: ENABLED (event=${{ github.event_name }}, llm_paths=${{ steps.filter.outputs.llm_paths }})"
          else
            echo "run_llm=false" >> "$GITHUB_OUTPUT"
            echo "LLM-gated tests: SKIPPED — no agent/RAG/chat/SSE paths touched in this PR."
          fi

  integrity:
    needs: gate
    runs-on: ubuntu-latest
    env:
      # LLM keys are only exposed when the gate says so. Empty values cause
      # the agent SSE endpoint to fail cleanly, which makes the LLM-gated
      # integration and e2e tests pytest.skip / test.skip themselves.
      OPENAI_API_KEY: ${{ needs.gate.outputs.run_llm == 'true' && secrets.OPENAI_API_KEY || '' }}
      ANTHROPIC_API_KEY: ${{ needs.gate.outputs.run_llm == 'true' && secrets.ANTHROPIC_API_KEY || '' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Write .env for docker compose
        run: |
          cat > .env <<EOF
          OPENAI_API_KEY=${OPENAI_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          EOF

      - name: Boot the stack
        run: docker compose up -d --build

      - name: Wait for the stack to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/resources/ >/dev/null \
               && curl -sf http://localhost:3000/ >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 5
          done
          echo "stack did not become ready in time"
          docker compose logs
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: HTTP / SSE integration tests
        run: |
          python -m pip install -r integration/requirements.txt
          pytest integration/ -v

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Browser E2E (Playwright)
        working-directory: frontend
        env:
          PLAYDESK_WEB: http://localhost:3000
          # Empty when the gate said no, or when no LLM secret is configured.
          # The agent E2E tests in semantic.e2e.ts and chat.e2e.ts then skip.
          PLAYDESK_LLM: ${{ needs.gate.outputs.run_llm == 'true' && secrets.ANTHROPIC_API_KEY != '' && '1' || '' }}
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run e2e

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose down -v
